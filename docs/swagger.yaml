definitions:
  dto.CreateArticleRequest:
    properties:
      content:
        type: string
      title:
        type: string
    type: object
  dto.CreateArticleTagRequest:
    properties:
      article_id:
        type: integer
      tag_id:
        type: integer
    type: object
  dto.CreateCommentRequest:
    properties:
      article_id:
        type: integer
      content:
        type: string
    type: object
  dto.CreateTagRequest:
    properties:
      name:
        type: string
      slug:
        type: string
    type: object
  dto.SignInRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dto.SignUpRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  dto.UpdateArticleRequest:
    properties:
      active:
        type: boolean
      content:
        type: string
      title:
        type: string
    type: object
  models.Article:
    properties:
      active:
        type: boolean
      content:
        type: string
      createdAt:
        type: string
      id:
        format: int64
        type: integer
      title:
        type: string
      userID:
        format: int64
        type: integer
      viewCount:
        format: int64
        type: integer
    type: object
  models.ArtilceTag:
    properties:
      article_id:
        type: integer
      tag_id:
        type: integer
    type: object
  models.Comments:
    properties:
      article_id:
        type: integer
      content:
        type: string
      create_at:
        type: string
      id:
        type: integer
      user_id:
        type: integer
    type: object
  models.Follows:
    properties:
      follower_id:
        type: integer
      following_id:
        type: integer
    type: object
  models.Tag:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
info:
  contact: {}
paths:
  /article-tags:
    get:
      parameters:
      - description: Article ID
        in: query
        name: article_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ArtilceTag'
            type: array
      summary: Article taglarini ko'rish
      tags:
      - ArticleTags
  /article-tags/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: Article va Tag ID
        in: body
        name: article_tag
        required: true
        schema:
          $ref: '#/definitions/dto.CreateArticleTagRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Tag qo'shildi
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Articlega tag qo'shish
      tags:
      - ArticleTags
  /article-tags/delete:
    delete:
      parameters:
      - description: Article ID
        in: query
