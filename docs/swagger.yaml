        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/dto.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: muvafaqiyatli qo'shildi
          schema:
            type: string
        "400":
          description: Noto'g'ri so'rov
          schema:
            type: string
        "500":
          description: Server xatosi
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Yangi article yaratish
      tags:
      - articles
  /articles/delete:
    delete:
      parameters:
