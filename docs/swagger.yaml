        in: query
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: o'chirildi
          schema:
            type: string
        "400":
          description: id noto'g'ri
          schema:
            type: string
        "500":
          description: server xatosi
          schema:
            type: string
