        in: query
        name: id
        required: true
        type: integer
      - description: Article ma'lumotlari
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: yangilandi
          schema:
            type: string
        "400":
          description: id noto'g'ri
          schema:
            type: string
        "500":
