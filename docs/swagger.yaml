basePath: /
definitions:
  dto.CreateArticleRequest:
    properties:
      content:
        type: string
      title:
        type: string
    type: object
  dto.UpdateArticleRequest:
    properties:
      active:
        type: boolean
      content:
        type: string
      title:
        type: string
    type: object
  models.Article:
    properties:
      active:
        type: boolean
      content:
        type: string
      createdAt:
        type: string
      id:
        format: int64
        type: integer
      title:
        type: string
      userID:
        format: int64
        type: integer
      viewCount:
        format: int64
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Blog loyihasi API
  title: Blog API
  version: "1.0"
paths:
  /articles:
    get:
      description: Ma'lumotlar bazasidan barcha maqolalar ro'yxatini qaytaradi
      produces:
      - application/json
      responses:
        "200":
          description: Maqolalar ro'yxati muvaffaqiyatli qaytarildi
          schema:
            items:
              $ref: '#/definitions/models.Article'
            type: array
        "500":
          description: Ichki server xatosi
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Barcha maqolalarni olish
      tags:
      - articles
  /articles/create:
    post:
      consumes:
      - application/json
      description: Title va content bilan yangi article yaratadi
      parameters:
      - description: Article ma'lumotlari
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/dto.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: muvafaqiyatli qo'shildi
          schema:
            type: string
        "400":
          description: Noto'g'ri so'rov
          schema:
            type: string
        "500":
          description: Server xatosi
          schema:
            type: string
      summary: Yangi article yaratish
      tags:
      - articles
  /articles/delete:
    delete:
      parameters:
      - description: Article ID
        in: query
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: o'chirildi
          schema:
            type: string
        "400":
          description: id noto'g'ri
          schema:
            type: string
        "500":
          description: server xatosi
          schema:
            type: string
      summary: Article o'chirish
      tags:
      - articles
  /articles/update:
    put:
      consumes:
      - application/json
      description: Article title, content va active holatini yangilaydi
      parameters:
      - description: Article ID
        in: query
        name: id
        required: true
        type: integer
      - description: Article ma'lumotlari
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: yangilandi
          schema:
            type: string
        "400":
          description: id noto'g'ri
          schema:
            type: string
        "500":
          description: server xatosi
          schema:
            type: string
      summary: Article yangilash
      tags:
      - articles
swagger: "2.0"
